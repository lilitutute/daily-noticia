<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>西语SuperO · 每日外刊</title>
  <style>
    :root {
      --brand:   #5875a3;
      --accent:  #6d8ab8;
      --border:  #d8dfe9;
      --bg:      #f5f7fb;
      --text:    #1a1a1a;
      --muted:   #777;
      --font-zh: 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
      --font-es: 'Georgia', 'Times New Roman', serif;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: var(--font-zh);
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 40px 20px;
    }

    .site-header {
      text-align: center;
      margin-bottom: 40px;
    }

    .site-title {
      font-size: 28px;
      font-weight: 700;
      color: var(--brand);
      letter-spacing: 1px;
    }

    .site-sub {
      font-size: 14px;
      color: var(--muted);
      margin-top: 6px;
    }

    .day-group {
      max-width: 860px;
      margin: 0 auto 48px auto;
    }

    .day-label {
      font-size: 13px;
      font-weight: 700;
      color: var(--brand);
      border-left: 4px solid var(--brand);
      padding-left: 10px;
      margin-bottom: 16px;
      letter-spacing: 1px;
    }

    .card-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
    }

    .card {
      background: #fff;
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 18px 20px;
      text-decoration: none;
      color: inherit;
      display: block;
      transition: box-shadow 0.2s, transform 0.2s;
      grid-column: 1 / -1;
    }

    .card:hover {
      box-shadow: 0 4px 18px rgba(88,117,163,0.15);
      transform: translateY(-2px);
    }

    .card-type {
      font-size: 10.5px;
      font-weight: 700;
      color: #fff;
      background: var(--brand);
      padding: 2px 9px;
      border-radius: 3px;
      display: inline-block;
      margin-bottom: 10px;
    }

    .card-title-es {
      font-family: var(--font-es);
      font-size: 16px;
      font-weight: 700;
      line-height: 1.4;
      margin-bottom: 5px;
      color: var(--text);
    }

    .card-title-zh {
      font-size: 13px;
      color: var(--muted);
      margin-bottom: 10px;
    }

    .card-meta {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .meta-tag {
      font-size: 11px;
      color: var(--brand);
      border: 1px solid var(--accent);
      padding: 1px 7px;
      border-radius: 3px;
    }

    .empty {
      text-align: center;
      color: var(--muted);
      font-size: 14px;
      padding: 60px 0;
    }

    .loading {
      text-align: center;
      color: var(--muted);
      font-size: 14px;
      padding: 60px 0;
    }
  </style>
</head>
<body>

<header class="site-header">
  <div class="site-title">西语SuperO · 每日外刊</div>
  <div class="site-sub">点击卡片阅读当日文章</div>
</header>

<div id="home-body">
  <div class="loading">加载中…</div>
</div>

<script>
  function getIssueNumber(filename) {
    return filename.split('-')[0];
  }

  function formatLabel(issueNum) {
    return `第${issueNum}期`;
  }

  async function buildHome() {
    const container = document.getElementById('home-body');

    // 1. 读取 index.json
    let files = [];
    try {
      const res = await fetch('index.json');
      files = await res.json();
    } catch(e) {
      container.innerHTML = '<div class="empty">暂无内容</div>';
      return;
    }

    // 2. 并行 fetch 所有文章
    const results = await Promise.all(
      files.map(async (file) => {
        try {
          const res = await fetch(`articles/${file}.json`);
          if (!res.ok) return { file, data: null };
          const data = await res.json();
          return { file, data };
        } catch(e) {
          return { file, data: null };
        }
      })
    );

    // 3. 按期号分组，失败的直接丢弃
    const groupMap = new Map();
    for (const { file, data } of results) {
      if (!data) continue;
      const issueNum = getIssueNumber(file);
      if (!groupMap.has(issueNum)) groupMap.set(issueNum, []);
      groupMap.get(issueNum).push({ file, data });
    }

    // 4. 清空 loading
    container.innerHTML = '';

    // 5. 没有任何内容
    if (groupMap.size === 0) {
      container.innerHTML = '<div class="empty">暂无内容</div>';
      return;
    }

    // 6. 渲染每一期
    for (const [issueNum, articles] of groupMap) {
      const group = document.createElement('div');
      group.className = 'day-group';
      group.innerHTML = `<div class="day-label">📘 ${formatLabel(issueNum)}</div>`;

      const grid = document.createElement('div');
      grid.className = 'card-grid';

      for (const { file, data } of articles) {
        const a = document.createElement('a');
        a.className = 'card';
        a.href      = `article.html?article=${file}`;
        a.innerHTML = `
          <span class="card-type">📰 主文章</span>
          <div class="card-title-es">${data.title}</div>
          <div class="card-title-zh">${data.subtitle}</div>
          <div class="card-meta">
            <span class="meta-tag">${data.source}</span>
            <span class="meta-tag">${data.category}</span>
            <span class="meta-tag">${data.difficulty}</span>
            <span class="meta-tag">${data.wordCount}</span>
          </div>`;
        grid.appendChild(a);
      }

      group.appendChild(grid);
      container.appendChild(group);
    }
  }

  buildHome();
</script>
</body>
</html>
